[program:post-startup]
command=/bin/sh /var/www/html/docker/post-startup.sh
directory=/var/www/html
autostart=true
autorestart=false
startretries=1
startsecs=0
priority=999
stdout_logfile=/var/www/html/storage/logs/post-startup.log
stderr_logfile=/var/www/html/storage/logs/post-startup.log
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
