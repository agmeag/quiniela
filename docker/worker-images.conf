[program:worker-images]
process_name=%(program_name)s_%(process_num)02d
command=php -d memory_limit=256M /var/www/html/artisan queue:work --queue=images --sleep=3 --tries=3 --timeout=300 --no-interaction
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
startsecs=1
numprocs=1
stdout_logfile=/var/www/html/storage/logs/worker-images.log
stderr_logfile=/var/www/html/storage/logs/worker-images.log
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
