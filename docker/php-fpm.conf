
[global]
; Run in foreground for container
daemonize = no
error_log = /var/www/html/storage/logs/php-fpm.log
log_level = warning

[www]
; Network configuration
listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Security: Run as non-root user
user = www-data
group = www-data

; Process management (dynamic for better resource usage)
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 1000

; Performance tuning
pm.process_idle_timeout = 10s
request_terminate_timeout = 600s

; Security settings
security.limit_extensions = .php

; Logging
access.log = /var/www/html/storage/logs/fpm-access.log
catch_workers_output = yes
decorate_workers_output = no

; Environment variables
clear_env = no

; Status and ping endpoints for health checks
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong
