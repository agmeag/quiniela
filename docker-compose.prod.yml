version: "3.8"

# ----------------------------------------------------------------
# Quiniela 2026 — Production Stack
# Reverse proxy: Coolify's built-in Caddy routes to port 80 internally
# Usage: docker compose -f docker-compose.prod.yml up -d
# Required env vars in .env:
#   APP_NAME, APP_KEY, DB_PASSWORD
# ----------------------------------------------------------------

x-app-base: &app-base
  build:
    context: .
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  env_file: .env
  environment:
    - LOG_CHANNEL=stderr
    - DB_HOST=db
    - REDIS_HOST=redis
    - APP_ENV=production
  volumes:
    - storage_logs:/var/www/html/storage/logs
    - storage_app:/var/www/html/storage/app
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - quiniela

services:

  # ── Web: nginx + php-fpm only ──────────────────────────────────
  app:
    <<: *app-base
    container_name: ${APP_NAME:-quiniela}-app
    command: >
      bash -c "
        chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache &&
        su www-data -s /bin/bash -c '
          php /var/www/html/artisan config:clear --quiet &&
          php /var/www/html/artisan route:clear --quiet &&
          php /var/www/html/artisan view:clear --quiet &&
          php /var/www/html/artisan migrate --force &&
          php /var/www/html/artisan config:cache --quiet &&
          php /var/www/html/artisan route:cache --quiet &&
          php /var/www/html/artisan view:cache --quiet
        ' &&
        exec supervisord -n -c /var/www/html/docker/supervisord-web.conf
      "

  # ── Worker: horizon + scheduler + pulse ───────────────────────
  worker:
    <<: *app-base
    container_name: ${APP_NAME:-quiniela}-worker
    command: >
      bash -c "
        chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache &&
        exec supervisord -n -c /var/www/html/docker/supervisord-worker.conf
      "

  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-quiniela}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-quiniela}
      POSTGRES_USER: ${DB_USERNAME:-quiniela}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-quiniela}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - quiniela

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-quiniela}-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - quiniela

volumes:
  pgdata:
  redisdata:
  storage_logs:
  storage_app:

networks:
  quiniela:
    driver: bridge
